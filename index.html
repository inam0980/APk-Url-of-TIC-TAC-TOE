<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inam App - Download</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="icon-wrap">
        <div class="app-icon">
          <img src="ChatGPT Image May 24, 2026, 09_12_28 PM.png" alt="Inam App Logo" />
        </div>
      </div>

      <h1>Inam App</h1>
      <p class="subtitle">Android Application</p>

      <div class="info">
        <div class="info-item">
          <span class="label">File</span>
          <span class="value">app-release.apk</span>
        </div>
        <div class="info-item">
          <span class="label">Size</span>
          <span class="value" id="fileSize">Loading...</span>
        </div>
        <div class="info-item">
          <span class="label">Version</span>
          <span class="value">1.0.0</span>
        </div>
      </div>

      <a id="downloadBtn" href="app-release.apk" download="app-release.apk" class="btn">
        <svg class="dl-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3v12m0 0l-4-4m4 4l4-4M5 21h14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span>Download APK</span>
      </a>

      <p class="note">Install karne ke liye phone me "Unknown sources" enable karein.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
